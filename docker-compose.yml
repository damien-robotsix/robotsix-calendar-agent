# Production deployment for the calendar agent.
#
# The agent connects to the already-deployed agent-comm broker over its
# public TLS endpoint (system trust + bearer token — no CA file or client
# cert) and registers in mailbox/pull mode as `robotsix-calendar`. It talks
# to a Radicale CalDAV server that runs as a host service (not a container),
# reached via the docker host gateway.
#
# Required env (e.g. via a local .env file next to this compose):
#   BROKER_AGENT_TOKEN  - this agent's bearer token, provisioned on the broker
#   RADICALE_URL        - e.g. http://host.docker.internal:5232
#   RADICALE_USERNAME / RADICALE_PASSWORD
# Optional: BROKER_HOST (default ai-broker.robotsix.net), BROKER_PORT (443),
#   BROKER_SCHEME (https).
services:
  calendar-agent:
    image: ghcr.io/damien-robotsix/robotsix-calendar-agent:main
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Transport — mailbox/pull mode against the secured broker.
      CALENDAR_AGENT_TRANSPORT: brokered
      CALENDAR_AGENT_ID: robotsix-calendar
      # Broker connection (public TLS endpoint; system trust + token).
      BROKER_HOST: ${BROKER_HOST:-ai-broker.robotsix.net}
      BROKER_PORT: ${BROKER_PORT:-443}
      BROKER_SCHEME: ${BROKER_SCHEME:-https}
      BROKER_AGENT_TOKEN: ${BROKER_AGENT_TOKEN:?set BROKER_AGENT_TOKEN}
      # Radicale backend (host service reached via the docker host gateway).
      RADICALE_URL: ${RADICALE_URL:-http://host.docker.internal:5232}
      RADICALE_USERNAME: ${RADICALE_USERNAME:?set RADICALE_USERNAME}
      RADICALE_PASSWORD: ${RADICALE_PASSWORD:?set RADICALE_PASSWORD}
    extra_hosts:
      # Lets RADICALE_URL=http://host.docker.internal:5232 reach the host's
      # Radicale service from inside the container.
      - "host.docker.internal:host-gateway"
    labels:
      # Opt this container into Watchtower's continuous deploy of the
      # moving `:main` tag.
      com.centurylinklabs.watchtower.enable: "true"
