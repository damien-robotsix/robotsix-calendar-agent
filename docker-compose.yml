# central-deploy-contract-version: 1
services:
  calendar-agent:
    image: ghcr.io/damien-robotsix/robotsix-calendar-agent:main
    ports:
      - "8201:8080"
    environment:
      RADICALE_URL: http://radicale:5232
      RADICALE_USERNAME: ""
      RADICALE_PASSWORD: ""
    healthcheck:
      test: ["CMD", "calendar-agent-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
