ci:
  autofix_prs: true
  autoupdate_schedule: weekly
  autofix_commit_msg: "style(pre-commit.ci): auto-fix hook{hook_id}"
  submodules: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: unsupported
        pass_filenames: false
        always_run: true
        require_serial: true

  - repo: https://github.com/betterleaks/betterleaks
    rev: v1.6.1
    hooks:
      - id: betterleaks
        exclude: '^uv\.lock$|^package-lock\.json$|.*\.lock$'

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/damien-robotsix/robotsix-modules
    rev: 4c1263002870a2dc4cf0eb0eba1392fbc42110fd  # main
    hooks:
      - id: validate-module-taxonomy

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: vulture
        name: vulture
        entry: uv run --frozen vulture src/ vulture_whitelist.py
        language: unsupported
        pass_filenames: false
