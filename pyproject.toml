[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-calendar-agent"
version = "0.1.0"
description = "Agent-comm agent managing a Radicale CalDAV/CardDAV calendar + contacts"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Robotsix", email = "dev@robotsix.com"}
]
dependencies = [
    "httpx",
    "pydantic",
    "pydantic-ai-slim",
    "structlog",
    "caldav",
]

[dependency-groups]
dev = ["pytest", "pytest-cov"]
lint = ["ruff", "mypy", "deptry"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
