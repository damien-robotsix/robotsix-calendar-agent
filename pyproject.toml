[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-calendar-agent"
version = "0.1.0"
description = "Agent-comm calendar and contacts agent for Radicale"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Damien Robotsix", email = "damien.robotsix@gmail.com" }]
dependencies = [
    "robotsix-agent-comm",
    "robotsix-llmio",
    "caldav",
    "pydantic",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]

[project.scripts]
calendar-agent = "robotsix_calendar_agent.brokered_entrypoint:main"

[project.urls]
Homepage = "https://github.com/damien-robotsix/robotsix-calendar-agent"
Repository = "https://github.com/damien-robotsix/robotsix-calendar-agent"
Issues = "https://github.com/damien-robotsix/robotsix-calendar-agent/issues"

[dependency-groups]
dev = [
    "ruff",
    "mypy",
    "pytest",
    "pytest-cov",
    "pre-commit",
    "vulture",
]
docs = [
    "mkdocs",
    "mkdocs-material",
    "mkdocstrings[python]",
]

[tool.uv.sources]
robotsix-agent-comm = { git = "https://github.com/damien-robotsix/robotsix-agent-comm.git", rev = "bf5ad0dc5bd63556439c1366b4c85637d47e6288" }
robotsix-llmio = { git = "https://github.com/damien-robotsix/robotsix-llmio.git", rev = "6d068118191a3c504ebf3f513c6e69208f759e15" }

[tool.hatch.build.targets.wheel]
packages = ["src/robotsix_calendar_agent"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"vulture_whitelist.py" = ["B018", "F821"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["error"]

[tool.coverage.run]
source = ["robotsix_calendar_agent"]
branch = true
relative_files = true

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if TYPE_CHECKING:"]
