site_name: robotsix-calendar-agent
site_description: Agent-comm calendar and contacts agent for Radicale

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            docstring_style: google
            filters: ["!^_"]
            merge_init_into_class: true

nav:
  - Home: index.md
  - Tutorials: tutorials/index.md
  - Code Reference: reference/
