name: Weekly lockfile bump

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/deps-bump.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    secrets:
      DEPS_BUMP_TOKEN: ${{ secrets.DEPS_BUMP_TOKEN }}
