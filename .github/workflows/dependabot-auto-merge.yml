name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: read

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write  # needed to auto-merge dependabot PRs
      pull-requests: write  # needed to approve and merge dependabot PRs
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/dependabot-auto-merge.yml@9ea2955d11f3d595a7a812feff99ae0eea8240c1  # main
