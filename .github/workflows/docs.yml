name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    permissions:
      contents: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-docs.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15  # main  # pragma: allowlist secret  # zizmor: ignore[secrets-inherit]
    with:
      docs-install-args: "--group docs"
    secrets: inherit  # pragma: allowlist secret  # zizmor: ignore[secrets-inherit]
