name: Release

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: read
      packages: write  # needed to push container image to GHCR
      id-token: write  # needed for OIDC token for attestations
      attestations: write  # needed to write image attestations
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/docker-release.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15  # pragma: allowlist secret  # zizmor: ignore[secrets-inherit]
    secrets: inherit  # pragma: allowlist secret  # zizmor: ignore[secrets-inherit]
