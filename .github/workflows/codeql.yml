name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      actions: read  # needed to access workflow run info
      contents: read  # needed to check out the repository
      security-events: write  # needed to upload SARIF results to code scanning
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/codeql.yml@7314c9b6c2b536ca81023e8841f272b72733262e  # main
    with:
      languages: python
