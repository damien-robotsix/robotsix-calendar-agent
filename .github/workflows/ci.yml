name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run vulture src/ vulture_whitelist.py

  ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@main
    with:
      python-version: ${{ matrix.python-version }}
      install-extras: ""
      cov-package: "robotsix_calendar_agent"
      coverage-threshold: "85"
      mypy-advisory: false
