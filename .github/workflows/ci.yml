name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --with 'detect-secrets>=1.5' detect-secrets scan --baseline .secrets.baseline .

  ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@main
    with:
      python-version: ${{ matrix.python-version }}
      install-extras: ""
      cov-package: "robotsix_calendar_agent"
      coverage-threshold: "85"
      mypy-advisory: false
