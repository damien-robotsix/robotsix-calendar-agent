name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  security:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"

  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
      - run: uv lock --check

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
      - run: uv run --frozen vulture src/ vulture_whitelist.py

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
      - run: |
          for i in 1 2 3; do
            uv audit --frozen && exit 0
            echo "Attempt $i failed, retrying in 40s..."
            sleep 40
          done
          exit 1

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          config-file: .github/dependency-review-config.yml

  workflow-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
      - run: uv run --with zizmor zizmor . --format=sarif > zizmor.sarif
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        if: ${{ always() }}
        with:
          sarif_file: zizmor.sarif

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
        with:
          persist-credentials: false
      - uses: rhysd/actionlint@03d0035246f3e81f36aed592ffb4bebf33a03106  # v1.7.7

  commitizen-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff  # 0.27.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          push: false
          commit: false

  ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      python-version: ${{ matrix.python-version }}
      install-extras: ""
      cov-package: "robotsix_calendar_agent"
      coverage-threshold: "85"
      mypy-advisory: false
