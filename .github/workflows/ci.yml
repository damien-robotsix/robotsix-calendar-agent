name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15  # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"

  # hand-rolled: CodeQL taint-tracking SAST covers injection vulnerabilities
  # (command injection, SSRF, LDAP injection, SSTI) that Bandit/ruff can't catch.
  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # needed to upload SARIF results from CodeQL
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          languages: python
          build-mode: none
          queries: security-and-quality
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4

  baseline:
    permissions:
      contents: read
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/baseline-check.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15  # main
    with:
      has-docker: true

  docker-pr-scan:
    permissions:
      contents: read
      security-events: write  # needed to upload SARIF results to code scanning
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/docker-pr-scan.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15  # main

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  lockfile-check:
    name: Lockfile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
        with:
          enable-cache: true
      - run: uv lock --check

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  vulture:
    name: Vulture dead code check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
        with:
          enable-cache: true
      - run: uv run --frozen vulture src/ vulture_whitelist.py

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  deptry:
    name: Deptry unused dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
        with:
          enable-cache: true
      - run: uv run --frozen deptry src/

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
        with:
          enable-cache: true
      - run: |
          for i in 1 2 3; do
            uv audit --frozen && exit 0
            echo "Attempt $i failed, retrying in 40s..."
            sleep 40
          done
          exit 1

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed to comment dependency review findings on PRs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          config-file: .github/dependency-review-config.yml

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  workflow-audit:
    name: Workflow audit (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # needed to upload SARIF results from zizmor
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
        with:
          enable-cache: true
      - run: uv run --with zizmor zizmor . --format=sarif > zizmor.sarif
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        if: ${{ always() }}
        with:
          sarif_file: zizmor.sarif

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  commitizen-check:
    name: Commitizen check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff  # 0.27.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          push: false
          commit: false

  ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    permissions:
      contents: read
      security-events: write  # needed to upload SARIF results from Python CI
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@77e10e286717cfe0eeb6b8d9ce985f3794236d15  # main
    with:
      python-version: ${{ matrix.python-version }}
      install-extras: ""
      cov-package: "robotsix_calendar_agent"
      coverage-threshold: "85"
      mypy-advisory: false

  # hand-rolled: no shared workflow equivalent in robotsix-github-workflows
  coverage-report:
    name: Coverage report
    if: ${{ !cancelled() }}
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to write coverage badge to the repo
      pull-requests: write  # needed to post coverage comment on PRs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: true
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.4.2
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Generate coverage report
        run: |
          uv run pytest --cov=robotsix_calendar_agent --cov-report=xml --cov-report=html --cov-report=term \
            -m 'not integration' tests/
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-html
          path: htmlcov/
      - name: Post PR coverage comment
        uses: py-cov-action/python-coverage-comment-action@5d8df5979747514c914e1c5a12335a7cf9a2745f  # v4.1
        if: github.event_name == 'pull_request'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate coverage badge
        uses: py-cov-action/python-coverage-comment-action@5d8df5979747514c914e1c5a12335a7cf9a2745f  # v4.1
        if: github.ref == 'refs/heads/main'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 80
