name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@3c5ac1dda3069742afbdd79dc326d9db4d97f17f  # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"

  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
      - run: uv lock --check

  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
      - run: uv run --frozen vulture src/ vulture_whitelist.py

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@d914b262ffc244530a203ab40decab34c3abf34d  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
      - run: |
          for i in 1 2 3; do
            uv audit --frozen && exit 0
            sleep 40
          done
          exit 1

  ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@3c5ac1dda3069742afbdd79dc326d9db4d97f17f  # main
    with:
      python-version: ${{ matrix.python-version }}
      install-extras: ""
      cov-package: "robotsix_calendar_agent"
      coverage-threshold: "85"
      mypy-advisory: false
