version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: increase
    open-pull-requests-limit: 10
    groups:
      dev-deps:
        patterns: ["ruff", "mypy", "pytest*"]
        pr-review-days: 7
      docs-deps:
        patterns: ["mkdocs*"]
        pr-review-days: 7
      prod-deps:
        patterns: ["*"]
        pr-review-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-actions:
        patterns: ["*"]
        pr-review-days: 7
