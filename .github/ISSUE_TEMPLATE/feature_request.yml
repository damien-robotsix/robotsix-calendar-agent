name: Feature request
description: Suggest an idea for this project
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!

        Please make sure you have searched [existing feature requests](https://github.com/damien-robotsix/robotsix-calendar-agent/issues?q=is%3Aissue+label%3Aenhancement) before filing a new one.

  - type: checkboxes
    id: existing-requests
    attributes:
      label: Confirmation
      description: Please confirm you have checked for existing feature requests.
      options:
        - label: I have searched the existing feature requests and this idea has not been suggested before.
          required: true
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What is the pain point or missing capability?
      render: text
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like. Be as specific as you can.
      render: text
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: What alternative solutions or workarounds have you considered?
      render: text
    validations:
      required: false
