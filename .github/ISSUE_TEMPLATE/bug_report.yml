name: Bug report
description: File a bug report
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        Please make sure you have searched [existing issues](https://github.com/damien-robotsix/robotsix-calendar-agent/issues) before filing a new one.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Confirmation
      description: Please confirm you have checked for existing reports.
      options:
        - label: I have searched the existing issues and this bug has not been reported before.
          required: true
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, relevant package versions (`uv lock --frozen`), Docker image tag, etc.
      render: text
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Clear, numbered steps that reproduce the issue.
      placeholder: |
        1.
        2.
        3.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      render: text
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, logs, or tracebacks.
      render: text
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, configuration snippets, or anything else that helps.
      render: text
    validations:
      required: false
