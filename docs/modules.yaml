modules:
  - name: init
    path: src/robotsix_calendar_agent/__init__.py
    paths:
      - src/robotsix_calendar_agent/__init__.py
      - src/robotsix_calendar_agent/py.typed
    depends_on:
      - agent
      - caldav_client
      - intent_parser
    test_paths:
      - tests/test_smoke.py
      - tests/__init__.py
      - tests/conftest.py
    doc_paths:
      - docs/index.md
      - docs/tutorials/index.md

  - name: agent
    path: src/robotsix_calendar_agent/agent.py
    test_paths:
      - tests/agent/test_agent.py
    depends_on:
      - caldav_client
      - intent_parser

  - name: caldav_client
    path: src/robotsix_calendar_agent/caldav_client.py
    depends_on: []
    test_paths:
      - tests/test_caldav_client.py

  - name: intent_parser
    paths:
      - src/robotsix_calendar_agent/intent_parser.py
      - tests/test_intent_parser.py
    depends_on:
      - robotsix-llmio
