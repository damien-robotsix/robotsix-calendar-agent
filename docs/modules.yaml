modules:
  - name: init
    path: src/robotsix_calendar_agent/__init__.py
    paths:
      - src/robotsix_calendar_agent/__init__.py
      - src/robotsix_calendar_agent/py.typed
    depends_on:
      - agent
      - caldav_client
      - intent_parser
    test_paths:
      - tests/test_smoke.py
      - tests/__init__.py
      - tests/conftest.py
    doc_paths:
      - docs/index.md
      - docs/configuration.md
      - docs/tutorials/index.md
      - docs/reference/index.md
      - docs/modules.yaml
      - docs/tutorials/basic/first-agent.md

  - name: dispatch
    path: src/robotsix_calendar_agent/dispatch.py
    paths:
      - src/robotsix_calendar_agent/dispatch.py
    depends_on:
      - add_to_calendar_handler
      - caldav_client
      - intent_parser

  - name: agent
    path: src/robotsix_calendar_agent/agent.py
    paths:
      - src/robotsix_calendar_agent/agent.py
    test_paths:
      - tests/agent/test_agent.py
    doc_paths:
      - docs/agent/reference.md
      - docs/reference/component_agent.md
      - docs/agent/tutorials/manage-events.md
      - docs/tutorials/intermediate/component-agent-management.md
    depends_on:
      - dispatch
      - caldav_client
      - intent_parser

  - name: caldav_client
    path: src/robotsix_calendar_agent/caldav_client/__init__.py
    paths:
      - src/robotsix_calendar_agent/caldav_client/__init__.py
      - src/robotsix_calendar_agent/caldav_client/_shared.py
      - src/robotsix_calendar_agent/caldav_client/calendar_ops.py
      - src/robotsix_calendar_agent/caldav_client/contact_ops.py
      - src/robotsix_calendar_agent/caldav_client/task_ops.py
    depends_on: []
    test_paths:
      - tests/caldav_client/test_caldav_client.py
      - tests/caldav_client/__init__.py
      - tests/caldav_client/caldav_test_server.py
      - tests/caldav_client/test_caldav_integration.py
      - tests/caldav_client/test_hypothesis_roundtrip.py
    doc_paths:
      - docs/reference/caldav_client.md

  - name: add_to_calendar_handler
    path: src/robotsix_calendar_agent/add_to_calendar_handler.py
    paths:
      - src/robotsix_calendar_agent/add_to_calendar_handler.py
    test_paths:
      - tests/add_to_calendar_handler/test_add_to_calendar_handler.py
    doc_paths:
      - docs/reference/add_to_calendar_handler.md
    depends_on:
      - caldav_client

  - name: intent_parser
    path: src/robotsix_calendar_agent/intent_parser.py
    paths:
      - src/robotsix_calendar_agent/intent_parser.py
    test_paths:
      - tests/intent_parser/test_intent_parser.py
      - tests/intent_parser/test_intent_parser_contract.py
    doc_paths:
      - docs/reference/intent_parser.md
    depends_on:
      - robotsix-llmio

  - name: entrypoint
    path: src/robotsix_calendar_agent/entrypoint.py
    paths:
      - src/robotsix_calendar_agent/entrypoint.py
      - src/robotsix_calendar_agent/__main__.py
    test_paths:
      - tests/entrypoint/__init__.py
      - tests/entrypoint/test_entrypoint.py
    doc_paths:
      - docs/reference/entrypoint.md
    depends_on:
      - agent
      - settings

  - name: healthcheck
    path: src/robotsix_calendar_agent/healthcheck.py
    paths:
      - src/robotsix_calendar_agent/healthcheck.py
    depends_on:
      - settings
      - caldav_client

  - name: settings
    path: src/robotsix_calendar_agent/settings.py
    paths:
      - src/robotsix_calendar_agent/settings.py
    test_paths:
      - tests/settings/test_settings.py
    doc_paths:
      - docs/reference/settings.md
    depends_on: []

  - name: logging_config
    test_paths:
      - tests/logging_config/__init__.py
      - tests/logging_config/test_logging_config.py
    depends_on: []
